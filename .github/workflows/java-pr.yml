name: Java PR

# Pull request validation for Spring Boot services.

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: java-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      language: java
      working_directory: .
      java_version: "21"
      artifact_path: target
    secrets: inherit

  security:
    needs: build
    uses: ./.github/workflows/reusable-security.yml
    with:
      language: java
      working_directory: .
      scan_target: .
      sonar_host_url: ${{ vars.SONAR_HOST_URL }}
      sonar_project_key: ${{ vars.SONAR_PROJECT_KEY }}
      checkmarx_project_name: ${{ vars.CHECKMARX_PROJECT_NAME }}
    secrets: inherit
