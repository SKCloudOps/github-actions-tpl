name: Reusable Docker

# Builds and optionally pushes container images to the target registry.

on:
  workflow_call:
    inputs:
      aws_region:
        description: AWS region used for ECR auth.
        required: true
        type: string
      role_arn:
        description: IAM role ARN assumed through GitHub OIDC.
        required: true
        type: string
      image_uri:
        description: Fully qualified Docker image URI including tag.
        required: true
        type: string
      context:
        description: Docker build context.
        required: false
        default: "."
        type: string
      dockerfile:
        description: Dockerfile path.
        required: false
        default: Dockerfile
        type: string
      push:
        description: Push the image to the registry.
        required: false
        default: false
        type: boolean
      platforms:
        description: Buildx platforms list.
        required: false
        default: linux/amd64
        type: string
      download_artifact_name:
        description: Optional build artifact to restore before image build.
        required: false
        default: ""
        type: string
      download_artifact_path:
        description: Path to restore the downloaded artifact into.
        required: false
        default: "."
        type: string
    outputs:
      image_uri:
        description: Built image URI.
        value: ${{ jobs.docker.outputs.image_uri }}

jobs:
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download build artifact
        if: ${{ inputs.download_artifact_name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.download_artifact_name }}
          path: ${{ inputs.download_artifact_path }}

      - name: Configure AWS credentials
        if: ${{ inputs.push }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        if: ${{ inputs.push }}
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.image_uri }}

      - name: Set output
        id: meta
        shell: bash
        run: printf 'image_uri=%s\n' "${{ inputs.image_uri }}" >> "${GITHUB_OUTPUT}"
