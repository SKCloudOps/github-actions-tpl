name: Reusable ECR Login

# Establishes AWS identity and returns the target ECR registry host.

on:
  workflow_call:
    inputs:
      aws_region:
        description: AWS region.
        required: true
        type: string
      role_arn:
        description: IAM role ARN assumed through GitHub OIDC.
        required: true
        type: string
      account_id:
        description: AWS account ID.
        required: true
        type: string
    outputs:
      registry:
        description: ECR registry host.
        value: ${{ jobs.login.outputs.registry }}

jobs:
  login:
    name: ECR Login
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      registry: ${{ steps.login.outputs.registry }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2
