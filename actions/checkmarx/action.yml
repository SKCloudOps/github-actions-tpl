name: Checkmarx One Scan
description: Run a Checkmarx One scan through a containerized CLI wrapper.
inputs:
  project_name:
    description: Checkmarx project name.
    required: true
  source_path:
    description: Source path to scan.
    required: false
    default: "."
  client_id:
    description: Checkmarx client ID.
    required: true
  client_secret:
    description: Checkmarx client secret.
    required: true
  tenant:
    description: Checkmarx tenant.
    required: false
    default: "<CHECKMARX_TENANT>"
  base_uri:
    description: Checkmarx base URI.
    required: false
    default: "<CHECKMARX_BASE_URI>"
  image:
    description: Checkmarx CLI container image.
    required: false
    default: checkmarx/ast-cli:latest
runs:
  using: composite
  steps:
    - name: Run Checkmarx scan
      shell: bash
      run: |
        docker run --rm \
          -e CX_TENANT="${{ inputs.tenant }}" \
          -e CX_BASE_URI="${{ inputs.base_uri }}" \
          -e CX_CLIENT_ID="${{ inputs.client_id }}" \
          -e CX_CLIENT_SECRET="${{ inputs.client_secret }}" \
          -v "${GITHUB_WORKSPACE}:/workspace" \
          "${{ inputs.image }}" \
          scan create \
          --project-name "${{ inputs.project_name }}" \
          --source-path "/workspace/${{ inputs.source_path }}"

